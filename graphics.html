  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

      content="Graphic design and infographic works by Valeriy Moroz."

    <title>graphic design & infographic - Valeriy Moroz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/graphics.css?v=site-header" />
  </head>
  <body>
    <main class="graphics-page">
      <header class="graphics-home-header">
        <a class="graphics-home-header__title" href="/">Valery Moroz</a>
        <nav class="graphics-home-header__links" aria-label="Primary navigation">
          <a class="graphics-home-header__link" href="/portfolio/">
            <span>Portfolio</span>
            <svg
              class="graphics-home-header__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path d="M0 0h24v24H0z" fill="none" />
              <path
                fill="currentColor"
                d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"
              />
            </svg>
          </a>
          <a class="graphics-home-header__link" href="/graphics.html" aria-current="page">
            <span>Graphics</span>
            <svg
              class="graphics-home-header__icon"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <path d="M0 0h24v24H0z" fill="none" />
              <path
                fill="currentColor"
                d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"
              />
            </svg>
          </a>
        </nav>
      </header>

      <header class="graphics-page__header">
        <h1 class="graphics-page__title">graphic design &amp; infographic</h1>
      </header>

      <section class="graphics-page__grid" aria-label="Graphic design gallery">
        <figure class="graphics-page__tile">
          <img src="cases/justice-icons.webp" alt="Justice icons" loading="eager" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/gta-5-login.webp" alt="GTA 5 login concept" loading="eager" />
        </figure>
        <figure class="graphics-page__tile">
          <video
            src="cases/SaintsWorld logo.mp4"
            autoplay
            loop
            muted
            playsinline
            aria-label="SaintsWorld logo animation"
          ></video>
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/fundraiser.png" alt="Fundraiser" loading="eager" />
        </figure>
        <figure
          class="graphics-page__tile graphics-page__tile--interactive-video"
          tabindex="0"
          aria-label="AI Alarm advertisement video with controls"
          data-video-tile
        >
          <video
            src="cases/ads-alarm.mp4"
            autoplay
            loop
            muted
            playsinline
            preload="metadata"
            aria-label="AI Alarm advertisement video"
            data-controlled-video
          ></video>
          <figcaption class="graphics-video-controls" aria-label="AI Alarm video controls">
            <button
              class="graphics-video-controls__button graphics-video-controls__button--icon"
              type="button"
              aria-label="Pause video"
              data-video-pause
            >
              <svg
                class="graphics-video-controls__icon graphics-video-controls__icon--pause"
                xmlns="http://www.w3.org/2000/svg"
                width="1em"
                height="1em"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path d="M0 0h24v24H0z" fill="none" />
                <path fill="currentColor" d="M6 19h4V5H6zm8-14v14h4V5z" />
              </svg>
              <svg
                class="graphics-video-controls__icon graphics-video-controls__icon--play"
                xmlns="http://www.w3.org/2000/svg"
                width="1em"
                height="1em"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path d="M0 0h24v24H0z" fill="none" />
                <path fill="currentColor" d="M8 5v14l11-7z" />
              </svg>
            </button>
            <label class="graphics-video-controls__slider-wrap">
              <input
                class="graphics-video-controls__slider"
                type="range"
                min="0"
                max="100"
                value="0"
                step="0.1"
                aria-label="Scrub video"
                data-video-progress
              />
            </label>
            <button
              class="graphics-video-controls__button graphics-video-controls__button--icon graphics-video-controls__button--sound"
              type="button"
              aria-label="Watch with sound"
              data-video-sound
            >
              <svg
                class="graphics-video-controls__icon"
                xmlns="http://www.w3.org/2000/svg"
                width="1em"
                height="1em"
                viewBox="0 0 24 24"
                aria-hidden="true"
              >
                <path d="M0 0h24v24H0z" fill="none" />
                <path
                  fill="currentColor"
                  d="m19.8 22.6l-3.025-3.025q-.625.4-1.325.688t-1.45.462v-2.05q.35-.125.688-.25t.637-.3L12 14.8V20l-5-5H3V9h3.2L1.4 4.2l1.4-1.4l18.4 18.4zm-.2-5.8l-1.45-1.45q.425-.775.638-1.625t.212-1.75q0-2.35-1.375-4.2T14 5.275v-2.05q3.1.7 5.05 3.138T21 11.975q0 1.325-.363 2.55T19.6 16.8m-3.35-3.35L14 11.2V7.95q1.175.55 1.838 1.65T16.5 12q0 .375-.062.738t-.188.712M12 9.2L9.4 6.6L12 4z"
                />
              </svg>
              <span class="graphics-video-controls__tooltip">watch with sound</span>
            </button>
            <p class="graphics-video-controls__warning">
              Alarm sound at the beginning.
            </p>
          </figcaption>
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/kinetex-2.png" alt="Kinetex" loading="eager" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/kinetex.png" alt="Kinetex" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/swaps.png" alt="Swaps" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/aura.png" alt="Aura - AI Alarm Clock" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/orbit.png" alt="Orbit" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/fundraiser-logo.png" alt="Fundraiser logo" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/brusnichkin.png" alt="Brusnichkin" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/ivs.png" alt="IVS" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/of.png" alt="DeepFake Infinity Feed" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/funtam.png" alt="FunTam" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <img src="cases/ecl.png" alt="ECL" loading="lazy" />
        </figure>
        <figure class="graphics-page__tile">
          <video
            src="cases/teeth.mp4"
            autoplay
            loop
            muted
            playsinline
            aria-label="Tooth video case"
          ></video>
        </figure>
      </section>
    </main>
